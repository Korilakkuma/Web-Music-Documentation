<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" width="720" height="180"><rect width="100%" height="100%" fill="#fff"/><text x="360" y="40" fill="#424242" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Note On Message Structure (3 Bytes)</text><rect width="180" height="70" x="20" y="60" fill="none" stroke="#424242" stroke-width="2" rx="4"/><text x="110" y="85" fill="#424242" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Status Byte</text><text x="110" y="105" fill="#999" font-family="monospace" font-size="14" text-anchor="middle">1001 nnnn</text><text x="110" y="120" fill="#999" font-family="monospace" font-size="12" text-anchor="middle">(9n h)</text><text x="215" y="102" fill="#999" font-family="sans-serif" font-size="22" text-anchor="middle">+</text><rect width="180" height="70" x="230" y="60" fill="none" stroke="#999" stroke-width="2" rx="4"/><text x="320" y="85" fill="#424242" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Data Byte 1</text><text x="320" y="105" fill="#999" font-family="monospace" font-size="12" text-anchor="middle">0nnn nnnn</text><text x="320" y="120" fill="#999" font-family="sans-serif" font-size="12" text-anchor="middle">Note Number (Pitch)</text><text x="425" y="102" fill="#999" font-family="sans-serif" font-size="22" text-anchor="middle">+</text><rect width="180" height="70" x="440" y="60" fill="none" stroke="#999" stroke-width="2" rx="4"/><text x="530" y="85" fill="#424242" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Data Byte 2</text><text x="530" y="105" fill="#999" font-family="monospace" font-size="12" text-anchor="middle">0vvv vvvv</text><text x="530" y="120" fill="#999" font-family="sans-serif" font-size="12" text-anchor="middle">Velocity (Volume)</text><text x="110" y="150" fill="#999" font-family="sans-serif" font-size="11" text-anchor="middle">nnnn: MIDI Channel (0-15)</text></svg>