<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#999" d="m0 0 10 5-10 5z"/></marker></defs><rect width="100%" height="100%" fill="#fff"/><rect width="160" height="60" x="80" y="30" fill="none" stroke="#424242" stroke-width="2" rx="6"/><text x="160" y="55" fill="#424242" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">&apos;closed&apos;</text><text x="160" y="75" fill="#999" font-family="sans-serif" font-size="12" text-anchor="middle">(Default State)</text><rect width="160" height="60" x="560" y="30" fill="none" stroke="#424242" stroke-width="2" rx="6"/><text x="640" y="55" fill="#424242" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">&apos;open&apos;</text><text x="640" y="75" fill="#999" font-family="sans-serif" font-size="12" text-anchor="middle">(Available for use)</text><rect width="160" height="60" x="560" y="190" fill="none" stroke="#424242" stroke-width="2" rx="6"/><text x="640" y="215" fill="#424242" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">&apos;pending&apos;</text><text x="640" y="235" fill="#999" font-family="sans-serif" font-size="12" text-anchor="middle">(Disconnected)</text><path fill="none" stroke="#999" stroke-width="2" marker-end="url(#arrow)" d="M240 45h305"/><text x="400" y="20" fill="#424242" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">open() <tspan fill="#999" font-family="sans-serif" font-weight="normal">or Implicit Open</tspan></text><text x="400" y="35" fill="#999" font-family="sans-serif" font-size="11" text-anchor="middle">(e.g. adding event handler, send())</text><path fill="none" stroke="#999" stroke-width="2" marker-end="url(#arrow)" d="M560 75H255"/><text x="400" y="95" fill="#424242" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">close() <tspan fill="#999" font-family="sans-serif" font-weight="normal">(Explicit)</tspan></text><path fill="none" stroke="#999" stroke-width="2" marker-end="url(#arrow)" d="M660 90v85"/><text x="670" y="135" fill="#424242" font-family="sans-serif" font-size="12" font-weight="bold">Device Disconnected</text><path fill="none" stroke="#999" stroke-width="2" marker-end="url(#arrow)" d="M620 190v-85"/><text x="610" y="135" fill="#424242" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="end">Reconnected</text><text x="610" y="150" fill="#999" font-family="sans-serif" font-size="11" text-anchor="end">(Reopen Success)</text><path fill="none" stroke="#999" stroke-dasharray="4 4" stroke-width="2" marker-end="url(#arrow)" d="M560 220H160V105"/><text x="360" y="210" fill="#424242" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Reconnected (Reopen Failed)</text><text x="360" y="240" fill="#999" font-family="sans-serif" font-size="11" text-anchor="middle">Fallback to closed state</text></svg>
