<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" width="720" height="180"><rect width="100%" height="100%" fill="#fff"/><text x="360" y="40" fill="#424242" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Program Change Message Structure (2 Bytes)</text><rect width="180" height="70" x="100" y="60" fill="none" stroke="#424242" stroke-width="2" rx="4"/><text x="190" y="85" fill="#424242" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Status Byte</text><text x="190" y="105" fill="#999" font-family="monospace" font-size="14" text-anchor="middle">1100 nnnn</text><text x="190" y="120" fill="#999" font-family="monospace" font-size="12" text-anchor="middle">(Cn h)</text><text x="300" y="102" fill="#999" font-family="sans-serif" font-size="22" text-anchor="middle">+</text><rect width="180" height="70" x="320" y="60" fill="none" stroke="#999" stroke-width="2" rx="4"/><text x="410" y="85" fill="#424242" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Data Byte 1</text><text x="410" y="105" fill="#999" font-family="monospace" font-size="12" text-anchor="middle">0ppp pppp</text><text x="410" y="120" fill="#999" font-family="sans-serif" font-size="12" text-anchor="middle">Program Number (Patch)</text><text x="190" y="155" fill="#999" font-family="sans-serif" font-size="11" text-anchor="middle">nnnn: MIDI Channel (0-15)</text><text x="410" y="155" fill="#999" font-family="sans-serif" font-size="11" text-anchor="middle">ppppppp: Program Number (0-127)</text></svg>